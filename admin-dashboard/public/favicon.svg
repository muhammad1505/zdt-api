<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="50%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="10" fill="url(#bg)" stroke="#44403c" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="6" y="6" width="36" height="36" rx="8" fill="#d97706" opacity="0.06" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.04;0.1;0.04" dur="4s" repeatCount="indefinite"/>
  </rect>
  <g filter="url(#glow)">
    <rect x="9" y="24" width="3.5" height="14" rx="1.5" fill="url(#barGrad2)" opacity="0.85">
      <animate attributeName="height" values="14;24;14" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="24;14;24" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="16" width="3.5" height="22" rx="1.5" fill="url(#barGrad)" opacity="0.9">
      <animate attributeName="height" values="22;30;22" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="16;8;16" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="21" y="10" width="3.5" height="28" rx="1.5" fill="url(#barGrad)" opacity="0.95">
      <animate attributeName="height" values="28;16;28" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;22;10" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.95;0.7;0.95" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="27" y="18" width="3.5" height="20" rx="1.5" fill="url(#barGrad2)" opacity="0.85">
      <animate attributeName="height" values="20;28;20" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="18;10;18" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="33" y="26" width="3.5" height="12" rx="1.5" fill="url(#barGrad)" opacity="0.8">
      <animate attributeName="height" values="12;20;12" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="26;18;26" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.95;0.8" dur="1.3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <circle cx="24" cy="43" r="2" fill="#fbbf24" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;2.5;1.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
